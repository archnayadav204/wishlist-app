<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist Saver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #f9fafb;
    }

    /* ── Header ── */
    .header {
      background: #4f46e5;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header svg { flex-shrink: 0; }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p  { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    /* ── Body ── */
    .body { padding: 16px; }

    /* ── Alert ── */
    .alert {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      display: none;
    }
    .alert.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .alert.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .alert.show    { display: block; }

    /* ── Form ── */
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,0.15); }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-outline {
      background: white;
      color: #4f46e5;
      border: 1px solid #4f46e5;
      margin-top: 8px;
    }
    .btn-outline:hover { background: #eef2ff; }

    /* ── Logged-in view ── */
    #logged-in-view { display: none; }
    .user-card {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 15px;
      flex-shrink: 0;
    }
    .user-name  { font-weight: 700; font-size: 13px; }
    .user-label { font-size: 11px; color: #6b7280; }

    .tip {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #92400e;
      line-height: 1.5;
    }
    .tip strong { font-weight: 700; }

    /* ── Login view ── */
    #login-view { display: none; }

    /* ── Loading ── */
    #loading-view {
      text-align: center;
      padding: 24px;
      color: #6b7280;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682
               a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318
               a4.5 4.5 0 00-6.364 0z"/>
    </svg>
    <div>
      <h1>Wishlist Saver</h1>
      <p>Save Amazon &amp; Flipkart products to your dashboard</p>
    </div>
  </div>

  <div class="body">

    <!-- Loading state -->
    <div id="loading-view">Checking login status...</div>

    <!-- ── Logged-in view ── -->
    <div id="logged-in-view">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">U</div>
        <div>
          <div class="user-name" id="user-name">Username</div>
          <div class="user-label">Logged in</div>
        </div>
      </div>

      <div class="tip">
        <strong>How to save a product:</strong><br/>
        Visit any Amazon or Flipkart product page and click the <strong>"Save to Dashboard"</strong> button injected at the top of the buy box.
      </div>

      <button class="btn btn-outline" id="logout-btn">Logout</button>
    </div>

    <!-- ── Login view ── -->
    <div id="login-view">
      <div class="alert" id="alert"></div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" />
      </div>

      <button class="btn btn-primary" id="login-btn">Sign In</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
